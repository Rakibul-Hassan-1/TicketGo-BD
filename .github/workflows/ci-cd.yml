name: CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create server .env for CI
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          SSLCZ_STORE_ID: ${{ secrets.SSLCZ_STORE_ID }}
          SSLCZ_STORE_PASS: ${{ secrets.SSLCZ_STORE_PASS }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_PHONE: ${{ secrets.ADMIN_PHONE }}
          ADMIN_ROLE: ${{ secrets.ADMIN_ROLE }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
        run: |
          cat > server/.env << EOF
          NODE_ENV=production
          PORT=5000
          SSLCZ_IS_LIVE=false
          MONGODB_URI=${MONGODB_URI}
          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
          REDIS_URL=${REDIS_URL}
          EMAIL_HOST=${EMAIL_HOST}
          EMAIL_PORT=${EMAIL_PORT}
          EMAIL_USER=${EMAIL_USER}
          EMAIL_PASS=${EMAIL_PASS}
          SSLCZ_STORE_ID=${SSLCZ_STORE_ID}
          SSLCZ_STORE_PASS=${SSLCZ_STORE_PASS}
          BACKEND_URL=${BACKEND_URL}
          FRONTEND_URL=${FRONTEND_URL}
          ADMIN_NAME=${ADMIN_NAME}
          ADMIN_EMAIL=${ADMIN_EMAIL}
          ADMIN_PASSWORD=${ADMIN_PASSWORD}
          ADMIN_PHONE=${ADMIN_PHONE}
          ADMIN_ROLE=${ADMIN_ROLE}
          EOF

          cat > client/.env.local << EOF
          NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}
          EOF

      - name: Lint and type-check
        run: npm run build --workspace=shared -- --noEmit || true

      - name: Build all packages
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            shared/dist
            server/dist
            client/.next
          retention-days: 1

  deploy-client:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_NAME: ${{ secrets.VERCEL_PROJECT_NAME || 'ticketgo-bd-client' }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Vercel deployment requires VERCEL_TOKEN."
            exit 1
          fi
          npm install -g vercel
          vercel deploy --prod --yes --token=$VERCEL_TOKEN --scope=$VERCEL_ORG_ID --name=$VERCEL_PROJECT_NAME
        working-directory: client

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint client
        run: npm run lint --workspace=client || echo "⚠️ Lint warnings (non-blocking)"

      - name: Summary
        run: |
          echo "## ✅ CI/CD Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✓ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint  | ✓ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | 🔄 Conditional |" >> $GITHUB_STEP_SUMMARY
